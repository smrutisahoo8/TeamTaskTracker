openapi: 3.0.0
info:
  title: Team Task Tracker API
  version: 1.0.0
  description: Phase 1 API documentation for Team Task Tracker.
servers:
  - url: http://localhost:4000
paths:
  /api/health:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: API running
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
