version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: teamtasktracker-sqlserver

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TeamTracker@123"
      MSSQL_PID: "Developer"
      MSSQL_ENABLE_HADR: "1"

    ports:
      - "1433:1433"

    command: >
      /opt/mssql/bin/sqlservr

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: teamtasktracker-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

volumes:
  sqlserver_data: